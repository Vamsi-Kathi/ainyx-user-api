services:
  mysql:
    image: mysql:8.0
    container_name: ainyx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-3499}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ainyx_users}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Auto-apply the schema on first boot of an empty data volume.
      - ./db/migrations/000001_create_users_table.up.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-3499}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ainyx-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainyx-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: "3000"
      APP_ENV: "production"
      LOG_LEVEL: "info"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-3499}
      DB_NAME: ${MYSQL_DATABASE:-ainyx_users}
    ports:
      - "3000:3000"
    networks:
      - ainyx-net

volumes:
  mysql-data:

networks:
  ainyx-net:
    driver: bridge
