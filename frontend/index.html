<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ainyx User API — Console</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --line: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
      --ok: #22c55e; --err: #ef4444; --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); padding: 24px;
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
    .card h2 { margin: 0 0 14px; font-size: 15px; color: var(--accent); }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    input, button {
      width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--line);
      background: #0b1220; color: var(--text); font-size: 14px;
    }
    button {
      cursor: pointer; background: var(--accent); color: #08131c; border: none;
      font-weight: 600; margin-top: 12px; transition: opacity .15s;
    }
    button:hover { opacity: .9; }
    button.secondary { background: #334155; color: var(--text); }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; }
    .actions button { width: auto; padding: 5px 10px; margin: 0 4px 0 0; font-size: 12px; }
    .pill { padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #0b1220; border: 1px solid var(--line); }
    #toast {
      position: fixed; bottom: 20px; right: 20px; padding: 12px 16px; border-radius: 8px;
      color: #fff; font-size: 13px; opacity: 0; transform: translateY(10px);
      transition: all .2s; pointer-events: none; max-width: 380px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    .pager { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
    .pager button { width: auto; padding: 6px 14px; margin: 0; }
    .muted { color: var(--muted); font-size: 12px; }
    code { background: #0b1220; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Ainyx User API — Console</h1>
  <div class="sub">A minimal client for the GoFiber + MySQL user service. Base URL: <code id="baseLabel"></code></div>

  <div class="grid">
    <!-- Left: form -->
    <div class="card">
      <h2 id="formTitle">Create User</h2>
      <input type="hidden" id="userId" />
      <label for="name">Name</label>
      <input id="name" placeholder="Alice" />
      <label for="dob">Date of Birth</label>
      <input id="dob" type="date" />
      <button id="saveBtn" onclick="save()">Create</button>
      <button id="cancelBtn" class="secondary" style="display:none" onclick="resetForm()">Cancel Edit</button>
    </div>

    <!-- Right: list -->
    <div class="card">
      <h2>Users</h2>
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>DOB</th><th>Age</th><th>Actions</th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="5" class="muted">Loading…</td></tr>
        </tbody>
      </table>
      <div class="pager">
        <button class="secondary" onclick="prevPage()">← Prev</button>
        <span class="muted">Page <b id="pageNum">1</b> · <span id="totalLabel">0</span> total</span>
        <button class="secondary" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // If the page is served from the API host, use same-origin; otherwise default to :3000.
    const API = (location.origin && location.origin.startsWith("http"))
      ? location.origin
      : "http://localhost:3000";
    document.getElementById("baseLabel").textContent = API;

    let page = 1;
    const limit = 10;
    let total = 0;

    function toast(msg, type = "ok") {
      const colors = { ok: "#16a34a", err: "#dc2626", warn: "#d97706" };
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.background = colors[type] || colors.ok;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2600);
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json" },
        ...opts,
      });
      const rid = res.headers.get("X-Request-ID");
      if (res.status === 204) return { ok: true };
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error((body.error || "request failed") + (rid ? ` [${rid.slice(0, 8)}]` : ""));
      }
      return body;
    }

    async function load() {
      try {
        const data = await api(`/users?page=${page}&limit=${limit}`);
        total = data.pagination.total;
        document.getElementById("pageNum").textContent = data.pagination.page;
        document.getElementById("totalLabel").textContent = total;

        const rows = document.getElementById("rows");
        if (!data.data || data.data.length === 0) {
          rows.innerHTML = `<tr><td colspan="5" class="muted">No users yet.</td></tr>`;
          return;
        }
        rows.innerHTML = data.data.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${escapeHtml(u.name)}</td>
            <td>${u.dob}</td>
            <td><span class="pill">${u.age}</span></td>
            <td class="actions">
              <button onclick='edit(${u.id}, ${JSON.stringify(u.name)}, "${u.dob}")'>Edit</button>
              <button onclick="del(${u.id})">Delete</button>
            </td>
          </tr>`).join("");
      } catch (e) {
        toast(e.message, "err");
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    async function save() {
      const id = document.getElementById("userId").value;
      const name = document.getElementById("name").value.trim();
      const dob = document.getElementById("dob").value;
      if (!name || !dob) { toast("Name and DOB are required", "warn"); return; }

      const payload = JSON.stringify({ name, dob });
      try {
        if (id) {
          await api(`/users/${id}`, { method: "PUT", body: payload });
          toast("User updated");
        } else {
          await api(`/users`, { method: "POST", body: payload });
          toast("User created");
        }
        resetForm();
        load();
      } catch (e) {
        toast(e.message, "err");
      }
    }

    function edit(id, name, dob) {
      document.getElementById("userId").value = id;
      document.getElementById("name").value = name;
      document.getElementById("dob").value = dob;
      document.getElementById("formTitle").textContent = "Edit User #" + id;
      document.getElementById("saveBtn").textContent = "Update";
      document.getElementById("cancelBtn").style.display = "block";
    }

    function resetForm() {
      document.getElementById("userId").value = "";
      document.getElementById("name").value = "";
      document.getElementById("dob").value = "";
      document.getElementById("formTitle").textContent = "Create User";
      document.getElementById("saveBtn").textContent = "Create";
      document.getElementById("cancelBtn").style.display = "none";
    }

    async function del(id) {
      if (!confirm("Delete user #" + id + "?")) return;
      try {
        await api(`/users/${id}`, { method: "DELETE" });
        toast("User deleted");
        load();
      } catch (e) {
        toast(e.message, "err");
      }
    }

    function nextPage() {
      if (page * limit < total) { page++; load(); }
    }
    function prevPage() {
      if (page > 1) { page--; load(); }
    }

    load();
  </script>
</body>
</html>
